<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARS DVR Rumore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <section id="login-section" style="display:flex">
        <div class="login-wrapper">
            <div class="login-brand">
                <div class="login-logo">M</div>
                <h1>MARS</h1>
                <p class="login-subtitle">DVR Rischio Rumore</p>
                <span class="login-version">D.Lgs. 81/2008</span>
            </div>
            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" required placeholder="nome@azienda.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required placeholder="Password" autocomplete="current-password">
                </div>
                <div id="login-error" class="error-text"></div>
                <button type="submit" class="btn btn-primary btn-block">Accedi</button>
            </form>
        </div>
    </section>

    <section id="app-section" style="display:none">
        <div id="app">
            <header class="app-header">
                <div class="header-left">
                    <div class="header-brand">
                        <span class="header-logo">M</span>
                        <span class="header-title">MARS <small>DVR Rumore</small></span>
                    </div>
                </div>
                <nav class="main-nav" id="main-nav">
                    <a href="#dashboard" class="nav-link active" data-view="dashboard">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                        Dashboard
                    </a>
                    <a href="#assessments" class="nav-link" data-view="assessments">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                        Valutazioni
                    </a>
                    <a href="#templates" class="nav-link" data-view="templates">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z" rx="2"/><path d="M4 9h16"/><path d="M9 4v16"/></svg>
                        Template
                    </a>
                    <a href="#settings" class="nav-link" data-view="settings">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.32 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                        Impostazioni
                    </a>
                </nav>
                <div class="header-right">
                    <span id="current-user" class="user-badge"></span>
                    <button class="btn btn-ghost btn-small" id="logout-btn">Logout</button>
                </div>
            </header>

            <main id="main-content" class="content"></main>

            <div id="toast-container"></div>
            <div id="modal-container"></div>
        </div>
    </section>

    <script src="js/auth.js"></script>
    <script src="js/api-client.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
