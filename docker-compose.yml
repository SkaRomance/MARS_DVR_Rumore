version: "3.9"

services:
  app:
    build: .
    environment:
      - DATABASE_URL=postgresql+asyncpg://mars_noise:mars_noise_password@db:5432/mars_noise
      - REDIS_URL=redis://redis:6379/0
      - APP_ENV=production
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - KEYGEN_ACCOUNT_ID=${KEYGEN_ACCOUNT_ID:-}
      - KEYGEN_PRODUCT_ID=${KEYGEN_PRODUCT_ID:-}
      - KEYGEN_ADMIN_TOKEN=${KEYGEN_ADMIN_TOKEN:-}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:8080","http://localhost:8085"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - internal
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mars_noise
      POSTGRES_PASSWORD: mars_noise_password
      POSTGRES_DB: mars_noise
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mars_noise"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  backup:
    image: postgres:16-alpine
    environment:
      PGHOST: db
      PGUSER: mars_noise
      PGPASSWORD: mars_noise_password
      PGDATABASE: mars_noise
      REDISHOST: redis
      BACKUP_DIR: /backups
      RETENTION_DAYS: "30"
    volumes:
      - ./docker/backup:/scripts:ro
      - backup_data:/backups
    entrypoint: ["/bin/sh", "-c"]
    command: ["echo '0 2 * * * /scripts/backup_all.sh' | crontab - && crond -f -d 0"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  backup_data: